<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>特定商取引法に基づく表記 | Itsuki Kigoshi</title>
    <link href="/src/style.css" rel="stylesheet">
    <script src="/assets/js/fontawesome.js" type="module"></script>
    <style>
        @media (prefers-color-scheme: dark) {
            body {
                background-color: #000;
                color: #fff;
            }
        }
    </style>
</head>
<body class="min-h-screen flex flex-col w-full font-sans">
<header></header>

<main class="flex flex-col items-center justify-center w-full grow px-4">
    <h1 class="text-2xl font-bold mb-5 text-gray-900 dark:text-white border-b border-gray-200 dark:border-gray-800 pb-3">
        特定商取引法に基づく表記
    </h1>

    <div class="space-y-4">
        <section>
            <h2 class="text-sm font-bold uppercase tracking-widest text-gray-500">販売業者 / 運営責任者</h2>
            <p class="text-base">Itsuki KIGOSHI</p>
        </section>

        <section>
            <h2 class="text-sm font-bold uppercase tracking-widest text-gray-500">住所 / 電話番号</h2>
            <p class="text-base">請求があったら遅滞なく開示します</p>
        </section>

        <section>
            <h2 class="text-sm font-bold uppercase tracking-widest text-gray-500">電子メール</h2>
            <p class="text-base">itsukikigoshi+githubio[at]gmail.com</p>
        </section>

        <section>
            <h2 class="text-sm font-bold uppercase tracking-widest text-gray-500">引渡時期</h2>
            <p class="text-base">注文後すぐにご利用いただけます</p>
        </section>

        <section>
            <h2 class="text-sm font-bold uppercase tracking-widest text-gray-500">価格 / 追加料金</h2>
            <p class="text-base">なし</p>
        </section>

        <section>
            <h2 class="text-sm font-bold uppercase tracking-widest text-gray-500">決済手段</h2>
            <p class="text-base">クレジットカード</p>
        </section>

        <section>
            <h2 class="text-sm font-bold uppercase tracking-widest text-gray-500">決済期間</h2>
            <p class="text-base">直ちに処理されます</p>
        </section>

        <section>
            <h2 class="text-sm font-bold uppercase tracking-widest text-gray-500">返金</h2>
            <p class="text-base">
                注文日より10日以内に上記電子メールまでご連絡頂いた場合に限り返金を受け付けます
            </p>
        </section>
    </div>
</main>

<footer class="w-full py-10 flex flex-col items-center">
    <a class="text-gray-400 inline-flex items-center underline gap-2"
       href="/">
        <i class="fa-solid fa-arrow-left"></i>
        <span>Back</span>
    </a>
</footer>

</body>
</html>
